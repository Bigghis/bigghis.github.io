<!DOCTYPE html>
<html class="staticrypt-html">

        <title>/*[|template_title|]*/0</title>

        <style>
            /* --- Chirpy light mode (default) --- */
            :root {
                --body-bg: #f8f9fa;
                --main-bg: #ffffff;
                --text-color: #595959;
                --heading-color: #2a2a2a;
                --muted-color: #6c757d;
                --border-color: rgba(0, 0, 0, 0.09);
                --card-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.12), 0 1px 2px rgba(0, 0, 0, 0.08);
                --accent: #2a408e;
                --accent-hover: #1e3278;
                --input-bg: #ffffff;
                --input-border: #c9cfd4;
                --input-border-focus: #2a408e;
                --icon-filter: none;
                --font-family: 'Source Han Sans CN', 'Microsoft Yahei', 'Segoe UI', Arial, sans-serif;
            }

            /* --- Chirpy dark mode --- */
            @media (prefers-color-scheme: dark) {
                :root {
                    --body-bg: #1b1b1e;
                    --main-bg: #27272a;
                    --text-color: #b0b0b0;
                    --heading-color: rgba(255, 255, 255, 0.85);
                    --muted-color: #868e96;
                    --border-color: rgba(255, 255, 255, 0.12);
                    --card-shadow: 0 1px 4px rgba(0, 0, 0, 0.5);
                    --input-bg: #3a3a3d;
                    --input-border: #4a4a4e;
                    --input-border-focus: #6494ed;
                    --accent: #6494ed;
                    --accent-hover: #4d7de8;
                    --icon-filter: invert(0.7);
                }
            }

            * { box-sizing: border-box; margin: 0; padding: 0; }

            .staticrypt-html { height: 100%; }

            .staticrypt-body {
                min-height: 100%;
                margin: 0;
                font-family: var(--font-family);
                background: var(--body-bg);
                color: var(--text-color);
                font-size: 16px;
                line-height: 1.6;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
            }

            /* --- Page layout --- */
            .staticrypt-content {
                display: flex;
                flex-direction: column;
                min-height: 100vh;
            }

            .staticrypt-page {
                flex: 1;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                padding: 2rem 1rem 3rem;
            }

            /* --- Card --- */
            .staticrypt-form {
                background: var(--main-bg);
                border: 1px solid var(--border-color);
                border-radius: 8px;
                padding: 2.25rem 2.5rem 2rem;
                box-shadow: var(--card-shadow);
                text-align: center;
                width: 100%;
                max-width: 440px;
            }

            .staticrypt-lock-icon {
                font-size: 2.25rem;
                margin-bottom: 0.85rem;
                line-height: 1;
            }

            .staticrypt-title {
                font-size: 1.35rem;
                font-weight: 700;
                color: var(--heading-color);
                margin-bottom: 0.4rem;
                letter-spacing: -0.01em;
            }

            .staticrypt-instructions {
                margin-bottom: 1.75rem;
            }

            .staticrypt-instructions p {
                color: var(--muted-color);
                font-size: 0.875rem;
                line-height: 1.55;
            }

            .staticrypt-hr { display: none; }

            /* --- Input --- */
            .staticrypt-password-container {
                position: relative;
                margin-bottom: 0.85rem;
            }

            .staticrypt-form input[type="password"],
            .staticrypt-form input[type="text"] {
                width: 100%;
                padding: 0.6rem 2.5rem 0.6rem 0.85rem;
                background: var(--input-bg);
                border: 1px solid var(--input-border);
                border-radius: 5px;
                color: var(--heading-color);
                font-size: 0.95rem;
                font-family: var(--font-family);
                outline: none;
                transition: border-color 0.15s, box-shadow 0.15s;
            }

            .staticrypt-form input[type="password"]:focus,
            .staticrypt-form input[type="text"]:focus {
                border-color: var(--input-border-focus);
                box-shadow: 0 0 0 3px rgba(42, 64, 142, 0.15);
            }

            @media (prefers-color-scheme: dark) {
                .staticrypt-form input[type="password"]:focus,
                .staticrypt-form input[type="text"]:focus {
                    box-shadow: 0 0 0 3px rgba(100, 148, 237, 0.2);
                }
            }

            .staticrypt-toggle-password-visibility {
                cursor: pointer;
                height: 18px;
                width: 18px;
                opacity: 0.5;
                position: absolute;
                right: 0.75rem;
                top: 50%;
                transform: translateY(-50%);
                filter: var(--icon-filter);
                transition: opacity 0.15s;
            }

            .staticrypt-toggle-password-visibility:hover {
                opacity: 0.8;
            }

            /* --- Remember me --- */
            label.staticrypt-remember {
                display: flex;
                align-items: center;
                gap: 0.5rem;
                margin-bottom: 1.1rem;
                color: var(--muted-color);
                font-size: 0.82rem;
                text-align: left;
                cursor: pointer;
            }

            .staticrypt-remember input[type="checkbox"] {
                accent-color: var(--accent);
                width: 0.9rem;
                height: 0.9rem;
                flex-shrink: 0;
            }

            /* --- Button --- */
            .staticrypt-form .staticrypt-decrypt-button {
                width: 100%;
                padding: 0.6rem 1rem;
                background: var(--accent);
                color: #fff;
                border: none;
                border-radius: 5px;
                font-size: 0.9rem;
                font-weight: 600;
                font-family: var(--font-family);
                cursor: pointer;
                transition: background 0.15s, filter 0.15s;
                letter-spacing: 0.06em;
                text-transform: uppercase;
            }

            .staticrypt-form .staticrypt-decrypt-button:hover {
                background: var(--accent-hover);
            }

            .staticrypt-form .staticrypt-decrypt-button:active {
                filter: brightness(0.92);
            }

            /* --- Spinner & utils --- */
            .hidden { display: none !important; }

            .staticrypt-spinner-container {
                height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .staticrypt-spinner {
                display: inline-block;
                width: 2rem;
                height: 2rem;
                border: 3px solid var(--border-color);
                border-top-color: var(--accent);
                border-radius: 50%;
                animation: spinner-border 0.7s linear infinite;
            }

            @keyframes spinner-border {
                100% { transform: rotate(360deg); }
            }
        </style>
    </head>

            </div>

                    toggleIcon.alt = templateToggleAltHide;

            document.getElementById("staticrypt-form").addEventListener("submit", async function (e) {

                const password = document.getElementById("staticrypt-password").value,
