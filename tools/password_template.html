<html class="staticrypt-html">

        <style>
            :root {
                --bg-primary: #1b1b1e;
                --bg-card: #252526;
                --text-primary: #d1d1d1;
                --text-secondary: #868e96;
                --accent: #2a408e;
                --accent-hover: #1e3278;
                --border: #404044;
                --error: #eb5757;
                --input-bg: #2d2d30;
                --font-family: 'Lato', 'Source Sans Pro', 'Microsoft Yahei', sans-serif;
            }

            @media (prefers-color-scheme: light) {
                :root {
                    --bg-primary: #f8f9fa;
                    --bg-card: #ffffff;
                    --text-primary: #1b1b1e;
                    --text-secondary: #6c757d;
                    --border: #dee2e6;
                    --input-bg: #f1f3f5;
                }
            }

            * { box-sizing: border-box; margin: 0; padding: 0; }

            .staticrypt-html { height: 100%; }

            .staticrypt-body {
                height: 100%;
                margin: 0;
                font-family: var(--font-family);
                background: var(--bg-primary);
                color: var(--text-primary);
                display: flex;
                justify-content: center;
                align-items: center;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
            }

            .staticrypt-page {
                width: 420px;
                padding: 1rem;
            }

            .staticrypt-form {
                background: var(--bg-card);
                border: 1px solid var(--border);
                border-radius: 12px;
                padding: 2.5rem;
                box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
                text-align: center;
            }

            .staticrypt-lock-icon {
                font-size: 2.5rem;
                margin-bottom: 1rem;
                opacity: 0.8;
            }

            .staticrypt-title {
                font-size: 1.4rem;
                font-weight: 600;
                margin-bottom: 0.5rem;
                color: var(--text-primary);
            }

            .staticrypt-instructions {
                margin-bottom: 1.5rem;
            }

            .staticrypt-instructions p {
                color: var(--text-secondary);
                font-size: 0.9rem;
                line-height: 1.5;
            }

            .staticrypt-hr { display: none; }

            .staticrypt-password-container {
                position: relative;
                margin-bottom: 1rem;
            }

            .staticrypt-form input[type="password"],
            .staticrypt-form input[type="text"] {
                width: 100%;
                padding: 0.75rem 2.5rem 0.75rem 1rem;
                background: var(--input-bg);
                border: 1px solid var(--border);
                border-radius: 8px;
                color: var(--text-primary);
                font-size: 1rem;
                font-family: var(--font-family);
                outline: none;
                transition: border-color 0.2s;
            }

            .staticrypt-form input:focus {
                border-color: var(--accent);
            }

            .staticrypt-toggle-password-visibility {
                cursor: pointer;
                height: 20px;
                width: 20px;
                opacity: 60%;
                position: absolute;
                right: 0.75rem;
                top: 50%;
                transform: translateY(-50%);
                filter: var(--icon-filter, invert(1));
            }

            @media (prefers-color-scheme: light) {
                :root { --icon-filter: none; }
            }

            label.staticrypt-remember {
                display: flex;
                align-items: center;
                gap: 0.5rem;
                margin-bottom: 1.25rem;
                color: var(--text-secondary);
                font-size: 0.85rem;
            }

            .staticrypt-remember input[type="checkbox"] {
                accent-color: var(--accent);
                width: 1rem;
                height: 1rem;
            }

            .staticrypt-form .staticrypt-decrypt-button {
                width: 100%;
                padding: 0.75rem;
                background: var(--accent);
                color: #fff;
                border: none;
                border-radius: 8px;
                font-size: 1rem;
                font-weight: 600;
                font-family: var(--font-family);
                cursor: pointer;
                transition: background 0.2s;
                letter-spacing: 0.02em;
                text-transform: uppercase;
            }

            .staticrypt-form .staticrypt-decrypt-button:hover,
            .staticrypt-form .staticrypt-decrypt-button:active,
            .staticrypt-form .staticrypt-decrypt-button:focus {
                background: var(--accent-hover);
            }

            .hidden { display: none !important; }

            .staticrypt-spinner-container {
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .staticrypt-spinner {
                display: inline-block;
                width: 2rem;
                height: 2rem;
                vertical-align: text-bottom;
                border: 0.25em solid var(--text-secondary);
                border-right-color: transparent;
                border-radius: 50%;
                animation: spinner-border 0.75s linear infinite;
            }

            @keyframes spinner-border {
                100% { transform: rotate(360deg); }
            }
        </style>
    </head>

                    toggleIcon.alt = templateToggleAltHide;

            document.getElementById("staticrypt-form").addEventListener("submit", async function (e) {

                const password = document.getElementById("staticrypt-password").value,
