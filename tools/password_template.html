<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>/*[|template_title|]*/0</title>
    <style>
        :root {
            --bg-primary: #1b1b1e;
            --bg-card: #252526;
            --text-primary: #d1d1d1;
            --text-secondary: #868e96;
            --accent: #2a408e;
            --accent-hover: #1e3278;
            --border: #404044;
            --error: #eb5757;
            --input-bg: #2d2d30;
            --font-family: 'Lato', 'Source Sans Pro', 'Microsoft Yahei', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-primary);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1rem;
        }

        .container {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2.5rem;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
        }

        .lock-icon {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 1rem;
            opacity: 0.8;
        }

        h1 {
            text-align: center;
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .instructions {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 1.5rem;
        }

        .input-group {
            position: relative;
            margin-bottom: 1rem;
        }

        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding: 0.75rem 2.5rem 0.75rem 1rem;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 1rem;
            font-family: var(--font-family);
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--accent);
        }

        .toggle-password {
            position: absolute;
            right: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.85rem;
            padding: 0.25rem;
        }

        .toggle-password:hover {
            color: var(--text-primary);
        }

        button[type="submit"] {
            width: 100%;
            padding: 0.75rem;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            font-family: var(--font-family);
            cursor: pointer;
            transition: background 0.2s;
            letter-spacing: 0.02em;
        }

        button[type="submit"]:hover {
            background: var(--accent-hover);
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.25rem;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .remember-me input[type="checkbox"] {
            accent-color: var(--accent);
            width: 1rem;
            height: 1rem;
        }

        .error {
            color: var(--error);
            text-align: center;
            font-size: 0.85rem;
            margin-top: 0.75rem;
            display: none;
        }

        @media (prefers-color-scheme: light) {
            :root {
                --bg-primary: #f8f9fa;
                --bg-card: #ffffff;
                --text-primary: #1b1b1e;
                --text-secondary: #6c757d;
                --border: #dee2e6;
                --input-bg: #f1f3f5;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="lock-icon">&#x1F512;</div>
        <h1>/*[|template_title|]*/0</h1>
        <p class="instructions">/*[|template_instructions|]*/0</p>

        <form id="staticrypt-form" action="#" method="post">
            <div class="input-group">
                <input id="staticrypt-password"
                       type="password"
                       name="password"
                       placeholder="/*[|template_placeholder|]*/0"
                       autofocus />
                <button type="button"
                        class="toggle-password"
                        id="toggle-btn"
                        aria-label="/*[|template_toggle_show|]*/0">
                    &#x1F441;
                </button>
            </div>

            <label class="remember-me" id="staticrypt-remember-label">
                <input id="staticrypt-remember"
                       type="checkbox"
                       name="remember" />
                /*[|template_remember|]*/0
            </label>

            <button type="submit">/*[|template_button|]*/0</button>

            <p class="error" id="staticrypt-error">/*[|template_error|]*/0</p>
        </form>
    </div>

    <script>
        var defined = "/*[|staticrypt_config|]*/0";
        var defined2 = "/*[|crypto_engine|]*/0";

        var defined3 = "/*[|is_remember_enabled|]*/0";

        var defined4 = "/*[|encrypted|]*/0";

        var defined5 = "/*[|staticrypt_js|]*/0";

        var toggleBtn = document.getElementById("toggle-btn");
        var pwdInput = document.getElementById("staticrypt-password");
        toggleBtn.addEventListener("click", function () {
            if (pwdInput.type === "password") {
                pwdInput.type = "text";
                toggleBtn.setAttribute("aria-label", "/*[|template_toggle_hide|]*/0");
            } else {
                pwdInput.type = "password";
                toggleBtn.setAttribute("aria-label", "/*[|template_toggle_show|]*/0");
            }
        });
    </script>
</body>
</html>
