name: "Build and Deploy"
on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - .gitignore
      - README.md
      - LICENSE

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # submodules: true
          # If using the 'assets' git submodule from Chirpy Starter, uncomment above
          # (See: https://github.com/cotes2020/chirpy-starter/tree/main/assets)

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3
          bundler-cache: true

      - name: Debug decrypt environment
        env:
          STATICRYPT_PASSWORD: ${{ secrets.STATICRYPT_PASSWORD }}
        run: |
          echo "=== OpenSSL version ==="
          openssl version
          echo "=== xxd version ==="
          xxd -v 2>&1 || echo "xxd not found"
          echo "=== Password length ==="
          printf '%s' "$STATICRYPT_PASSWORD" | wc -c
          echo "=== Key derivation test ==="
          printf '%s' "$STATICRYPT_PASSWORD" | openssl dgst -sha256 -hex
          echo "=== IV derivation test ==="
          printf '%s' "${STATICRYPT_PASSWORD}_iv" | openssl dgst -md5 -hex
          echo "=== Key (xxd) ==="
          printf '%s' "$STATICRYPT_PASSWORD" | openssl dgst -sha256 -binary | xxd -p -c 64
          echo "=== IV (xxd) ==="
          printf '%s' "${STATICRYPT_PASSWORD}_iv" | openssl dgst -md5 -binary | xxd -p -c 32
          echo "=== First encrypted file head ==="
          head -20 _posts/2026-01-04-AWS-CLOUD_COMPUTING.md
          echo "=== Extracted blob (first 3 lines) ==="
          awk '/<!-- ENCRYPTED -->/{f=1;next} f && /^[A-Za-z0-9+\/=]/{print}' _posts/2026-01-04-AWS-CLOUD_COMPUTING.md | head -3
          echo "=== Quick decrypt test ==="
          KEY=$(printf '%s' "$STATICRYPT_PASSWORD" | openssl dgst -sha256 -binary | xxd -p -c 64)
          IV=$(printf '%s' "${STATICRYPT_PASSWORD}_iv" | openssl dgst -md5 -binary | xxd -p -c 32)
          awk '/<!-- ENCRYPTED -->/{f=1;next} f && /^[A-Za-z0-9+\/=]/{print}' _posts/2026-01-04-AWS-CLOUD_COMPUTING.md > /tmp/blob.txt
          echo "Blob lines: $(wc -l < /tmp/blob.txt)"
          echo "Blob bytes: $(wc -c < /tmp/blob.txt)"
          openssl enc -aes-256-cbc -K "$KEY" -iv "$IV" -a -d < /tmp/blob.txt > /tmp/dec.txt 2>&1 && echo "DECRYPT OK" || echo "DECRYPT FAILED"

      - name: Decrypt protected posts for build
        env:
          STATICRYPT_PASSWORD: ${{ secrets.STATICRYPT_PASSWORD }}
        run: bash tools/decrypt-md.sh

      - name: Build site
        run: bundle exec jekyll b -d "_site${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: "production"

      - name: Test site
        run: |
          bundle exec htmlproofer _site \
            \-\-disable-external \
            \-\-ignore-urls "/^http:\/\/127.0.0.1/,/^http:\/\/0.0.0.0/,/^http:\/\/localhost/"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Encrypt protected posts
        env:
          STATICRYPT_PASSWORD: ${{ secrets.STATICRYPT_PASSWORD }}
          STATICRYPT_SALT: ${{ secrets.STATICRYPT_SALT }}
        run: |
          npm install staticrypt
          bash tools/encrypt-protected.sh "_site${{ steps.pages.outputs.base_path }}"

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: "_site${{ steps.pages.outputs.base_path }}"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
